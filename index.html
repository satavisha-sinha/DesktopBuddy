<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesktopBuddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="character-container">

        <div id="speech-bubble" 
        class="speech-bubble">
            TIME TO DRINK WATER!<br>
            TO STAY HYDRATED💧
        </div>

        <video
        id="girl-video"
        class="character-video"
        muted
        playsinline
        preload="auto">
        <source src="Assets/walking_in.webm" type="video/webm">
        </video>

        <img id="girl-sprite" src="Assets/Water reminder.png" 
        alt="Desktop Buddy" 
        class="character hidden">

        <div id="button-container"
         class="button-container">
            <button id="drink-btn" 
            class="drink-btn">🥤 I DRANK</button>
            <button id="snooze-btn" 
            class="snooze-btn">⏰ SNOOZE</button>
        </div>
        
    </div>
    <script src="config.js"></script>
    <script src="queue.js"></script>
    <script src="script.js"></script>
    <script src="scheduler.js"></script>

    <script>
        startScheduler();
    </script>
</body>
</html>
